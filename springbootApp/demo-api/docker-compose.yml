services:
  db:
    image: postgres:16
    container_name: demoapi-db
    environment:
      POSTGRES_DB: demoapi
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
    ports:
      - "5432:5432"
    volumes:
      - demoapi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demoapi"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: demoapi-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/demoapi
      SPRING_DATASOURCE_USERNAME: demo
      SPRING_DATASOURCE_PASSWORD: demo
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: demoapi-ui
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - app
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevents local node_modules from overwriting container's

volumes:
  demoapi_pgdata: