plugins {
	id 'java'
	id 'org.springframework.boot' version '3.3.10'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'springboot.example'
version = '0.0.1-SNAPSHOT'
description = 'Demo project for Spring Boot'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-web'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'

	runtimeOnly 'org.postgresql:postgresql'

	testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

tasks.named('test') {
	useJUnitPlatform()
}

springBoot {
  mainClass = 'springboot.example.demo_api.DemoApiApplication'
}

tasks.register("printSourceSets") {
    doLast {
        sourceSets.each { ss ->
            println "sourceSet: ${ss.name}"
            println "  java:      ${ss.java.srcDirs}"
            println "  resources: ${ss.resources.srcDirs}"
        }
    }
}

dependencies {
  implementation 'org.springframework.boot:spring-boot-starter-thymeleaf'
  // keep your existing deps (web, data-jpa, postgres, etc.)
}